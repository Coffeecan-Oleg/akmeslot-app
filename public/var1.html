<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АкмеСлот | Прототип</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .drawer-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script>
        // --- ИМИТАЦИЯ БЭКЕНДА (SERVICES) ---

        const ResourceService = {
            resources: [
                { id: 'res_room_001', type: 'meeting_room', name: 'Переговорная "Альфа"', status: 'occupied', capacity: 10, floor: 2, equipment: ['TV', 'Whiteboard'] },
                { id: 'res_room_002', type: 'meeting_room', name: 'Переговорная "Бета"', status: 'free', capacity: 4, floor: 2, equipment: ['TV'] },
                { id: 'res_desk_001', type: 'workplace', name: 'Рабочее место #101', status: 'my_booking', floor: 1, department: 'IT' },
                { id: 'res_desk_002', type: 'workplace', name: 'Рабочее место #102', status: 'free', floor: 1, department: 'IT' },
                { id: 'res_car_001', type: 'car', name: 'Toyota Camry (A777AA)', status: 'free', driver: 'Иван Иванов' },
                { id: 'res_equip_001', type: 'equipment', name: 'Проектор Epson', status: 'occupied', floor: 1 }
            ],
            getResources(type = null) {
                return type ? this.resources.filter(r => r.type === type) : [...this.resources];
            },
            getResourceById(id) {
                return this.resources.find(r => r.id === id);
            }
        };

        const BookingService = {
            bookings: [],
            hasConflict(resourceId, start, end) {
                return this.bookings.some(b => {
                    if (b.resourceId !== resourceId) return false;
                    return new Date(start) < new Date(b.end) && new Date(end) > new Date(b.start);
                });
            },
            createBooking(data) {
                if (this.hasConflict(data.resourceId, data.start, data.end)) {
                    throw new Error('Конфликт: Ресурс уже занят в это время');
                }
                const newBooking = { id: 'bk_' + Date.now(), ...data };
                this.bookings.push(newBooking);
                return newBooking;
            }
        };

        const AuthService = {
            user: { id: 1, name: 'Иван Пользователь' }
        };

        // --- ПРИЛОЖЕНИЕ (FRONTEND LOGIC) ---

        class AkmeSlotApp {
            constructor() {
                this.appElement = document.getElementById('root');
                this.state = {
                    resources: ResourceService.getResources(),
                    filteredResources: [...ResourceService.getResources()],
                    selectedResource: null,
                    filterType: null,
                    isDrawerOpen: false,
                    user: AuthService.user
                };
            }

            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.render();
            }

            handleFilterType(type) {
                const filtered = type ? ResourceService.getResources(type) : [...this.state.resources];
                this.setState({ filterType: type, filteredResources: filtered, selectedResource: null, isDrawerOpen: false });
            }

            selectResource(resource) {
                this.setState({ selectedResource: resource, isDrawerOpen: true });
            }

            closeDrawer() {
                this.setState({ isDrawerOpen: false, selectedResource: null });
            }

            async handleBooking(e) {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = {
                    resourceId: this.state.selectedResource.id,
                    userId: this.state.user.id,
                    start: `${formData.get('date')}T${formData.get('start')}:00`,
                    end: `${formData.get('date')}T${formData.get('end')}:00`,
                    title: formData.get('title')
                };

                try {
                    const booking = BookingService.createBooking(data);
                    alert(`✅ Успешно! Бронь ${booking.id} создана.`);
                    
                    const updated = this.state.resources.map(r => 
                        r.id === booking.resourceId ? { ...r, status: 'my_booking' } : r
                    );
                    this.setState({ resources: updated, filteredResources: [...updated] });
                    this.closeDrawer();
                } catch (err) {
                    alert(`❌ Ошибка: ${err.message}`);
                }
            }

            render() {
                this.appElement.innerHTML = `
                <div class="flex h-screen overflow-hidden">
                    <!-- Sidebar -->
                    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
                        <div class="p-6">
                            <h1 class="text-xl font-bold text-indigo-600 tracking-tight">АКМЕСЛОТ</h1>
                            <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Resources Booking</p>
                        </div>
                        <nav class="flex-1 px-4 space-y-1">
                            ${this.renderNav()}
                        </nav>
                        <div class="p-4 border-t border-slate-100">
                            <div class="flex items-center p-2">
                                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-xs">ИП</div>
                                <div class="ml-3">
                                    <p class="text-sm font-medium text-slate-700">${this.state.user.name}</p>
                                    <p class="text-xs text-slate-400">Пользователь</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <!-- Main Content -->
                    <main class="flex-1 overflow-y-auto p-8 relative">
                        <header class="flex justify-between items-center mb-8">
                            <div>
                                <h2 class="text-2xl font-bold text-slate-800">${this.getCategoryName(this.state.filterType)}</h2>
                                <p class="text-slate-500">Выберите ресурс для бронирования</p>
                            </div>
                        </header>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${this.state.filteredResources.map(res => this.renderCard(res)).join('')}
                        </div>

                        <!-- Drawer Overlay -->
                        ${this.state.isDrawerOpen ? `<div class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40" onclick="app.closeDrawer()"></div>` : ''}

                        <!-- Drawer -->
                        <aside class="fixed top-0 right-0 h-full w-96 bg-white shadow-2xl z-50 drawer-transition ${this.state.isDrawerOpen ? 'translate-x-0' : 'translate-x-full'}">
                            ${this.renderDrawer()}
                        </aside>
                    </main>
                </div>`;
                
                const form = document.getElementById('booking-form');
                if (form) form.onsubmit = (e) => this.handleBooking(e);
            }

            renderNav() {
                const items = [
                    { id: null, label: 'Все ресурсы', icon: '🏢' },
                    { id: 'meeting_room', label: 'Переговорные', icon: '🤝' },
                    { id: 'workplace', label: 'Рабочие места', icon: '🪑' },
                    { id: 'car', label: 'Автомобили', icon: '🚗' },
                    { id: 'equipment', label: 'Оборудование', icon: '🛠️' }
                ];
                return items.map(item => `
                    <a href="#" onclick="app.handleFilterType('${item.id || ''}')" 
                       class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-all ${this.state.filterType === item.id ? 'text-indigo-700 bg-indigo-50' : 'text-slate-600 hover:bg-slate-50'}">
                       <span class="mr-3">${item.icon}</span> ${item.label}
                    </a>
                `).join('');
            }

            renderCard(res) {
                const statusColors = { free: 'bg-emerald-500', occupied: 'bg-rose-500', my_booking: 'bg-indigo-500' };
                const statusLabels = { free: 'Свободно', occupied: 'Занято', my_booking: 'Моя бронь' };
                const icons = { meeting_room: '🤝', workplace: '🪑', car: '🚗', equipment: '🛠️' };

                return `
                    <div onclick="app.selectResource(${JSON.stringify(res).replace(/"/g, '&quot;')})" class="bg-white rounded-xl border border-slate-200 p-5 hover:shadow-lg transition-all cursor-pointer group">
                        <div class="flex justify-between items-start mb-4">
                            <div class="p-2 bg-slate-50 rounded-lg text-xl group-hover:scale-110 transition-transform">${icons[res.type] || '📦'}</div>
                            <span class="flex items-center text-xs font-medium ${res.status === 'free' ? 'text-emerald-600' : res.status === 'occupied' ? 'text-rose-600' : 'text-indigo-600'}">
                                <span class="status-dot ${statusColors[res.status]}"></span> ${statusLabels[res.status]}
                            </span>
                        </div>
                        <h4 class="font-bold text-slate-800 mb-1">${res.name}</h4>
                        <div class="text-xs text-slate-500 space-y-1">
                            ${res.floor ? `<div>📍 Этаж ${res.floor}</div>` : ''}
                            ${res.capacity ? `<div>👥 Вместимость: ${res.capacity} чел.</div>` : ''}
                            ${res.department ? `<div>🏢 Отдел: ${res.department}</div>` : ''}
                        </div>
                    </div>
                `;
            }

            renderDrawer() {
                if (!this.state.selectedResource) return '';
                const res = this.state.selectedResource;
                return `
                    <div class="h-full flex flex-col p-6">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-lg font-bold">Новое бронирование</h3>
                            <button onclick="app.closeDrawer()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
                        </div>
                        <div class="mb-8 p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                            <p class="text-xs text-indigo-500 uppercase font-bold mb-1">Выбранный ресурс</p>
                            <p class="text-lg font-bold text-indigo-900">${res.name}</p>
                        </div>
                        <form id="booking-form" class="space-y-5 flex-1">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Дата</label>
                                <input type="date" name="date" required class="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Начало</label>
                                    <input type="time" name="start" required class="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Конец</label>
                                    <input type="time" name="end" required class="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Цель встречи</label>
                                <input type="text" name="title" placeholder="Напр: Обсуждение проекта" required class="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 mt-6">
                                Подтвердить бронь
                            </button>
                        </form>
                    </div>
                `;
            }

            getCategoryName(type) {
                const names = { meeting_room: 'Переговорные', workplace: 'Рабочие места', car: 'Автомобили', equipment: 'Оборудование' };
                return names[type] || 'Все ресурсы';
            }
        }

        const app = new AkmeSlotApp();
        window.onload = () => app.render();
    </script>
</body>
</html>
